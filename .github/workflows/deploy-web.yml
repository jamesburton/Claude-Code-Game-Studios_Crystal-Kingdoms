name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --import --path .

      - name: Run tests
        run: godot --headless --path . -s tests/test_all.gd

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/CrystalKingdoms.html

      - name: Prepare Pages
        run: |
          # Rename to index.html for GitHub Pages
          mv build/web/CrystalKingdoms.html build/web/index.html
          # Add headers file for SharedArrayBuffer support (required by Godot web exports)
          cat > build/web/_headers <<'HEADERS'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          HEADERS

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
