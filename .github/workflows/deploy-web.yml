name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: true

      - name: Clean cached imports
        run: rm -rf .godot/

      - name: Import project
        run: godot --headless --import --path .

      - name: Run tests
        run: godot --headless --path . -s tests/test_all.gd

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/CrystalKingdoms.html

      - name: Prepare Pages
        run: |
          # Rename to index.html for GitHub Pages
          mv build/web/CrystalKingdoms.html build/web/index.html

          # GitHub Pages doesn't support custom headers.
          # Use coi-serviceworker to enable SharedArrayBuffer (required by Godot).
          curl -sL https://raw.githubusercontent.com/nickvdp/coi-serviceworker/main/coi-serviceworker.min.js \
            -o build/web/coi-serviceworker.min.js

          # Inject the service worker script into index.html before </head>
          sed -i 's|</head>|<script src="coi-serviceworker.min.js"></script></head>|' build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
